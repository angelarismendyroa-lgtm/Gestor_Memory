version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gestor-memory-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestor123}
      POSTGRES_DB: ${POSTGRES_DB:-gestor_memory}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: